[build]
builder = "DOCKERFILE"
dockerfilePath = "docdigest/Dockerfile.backend"
dockerContextPath = "docdigest"

[deploy]
startCommand = "python -m scripts.init_db && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
